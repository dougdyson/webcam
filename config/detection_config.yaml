debounce_frames: 3
enable_segmentation: false
min_detection_confidence: 0.7
min_tracking_confidence: 0.5
model_complexity: 1
smoothing_window: 5

# Presence gating configuration
gating:
  enabled: true
  phash_threshold_same: 10
  ssim_threshold_same: 0.90
  hysteresis:
    enter_k: 8
    exit_l: 5
  cooldown_ms: 3000

  # Vision-based verification (Option 3: State Transition Validation)
  vision_verification:
    enabled: true                      # Enable vision verification on state transitions
    max_blocks_per_session: 10         # Max consecutive blocks before allowing (fail-safe)
    recapture_on_block: true            # Recapture reference when blocking transition
    verify_enter_only: true             # Only verify enter transitions (not exit)

refs:
  capture_stable_seconds: 5
  max_per_bucket: 3
  refresh_minutes: 30
  cache_dir: /tmp/ziggy-webcam/refs
