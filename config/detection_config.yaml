debounce_frames: 3
enable_segmentation: false
min_detection_confidence: 0.5
min_tracking_confidence: 0.5
model_complexity: 1
smoothing_window: 5

# Presence gating configuration
gating:
  enabled: true
  phash_threshold_same: 14
  ssim_threshold_same: 0.94
  hysteresis:
    enter_k: 4
    exit_l: 5
  cooldown_ms: 1000

refs:
  capture_stable_seconds: 5
  max_per_bucket: 3
  refresh_minutes: 30
  cache_dir: /tmp/ziggy-webcam/refs
