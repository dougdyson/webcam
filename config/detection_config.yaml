detector: neural   # "neural" (MobileNet-SSD) or "multimodal" (MediaPipe pose+face)

debounce_frames: 3
enable_segmentation: false
min_detection_confidence: 0.5
min_tracking_confidence: 0.5
model_complexity: 1
smoothing_window: 5

# Presence gating configuration
gating:
  enabled: true
  phash_threshold_same: 14
  ssim_threshold_same: 0.94
  hysteresis:
    enter_k: 4
    exit_l: 5
  cooldown_ms: 1000

  # Vision-based verification (Option 3: State Transition Validation)
  vision_verification:
    enabled: true                      # Enable vision verification on state transitions
    verifier_backend: neural            # "neural" (MobileNet-SSD) or "ollama"
    max_blocks_per_session: 3          # Max consecutive blocks before allowing (fail-safe)
    recapture_on_block: true            # Recapture reference when blocking transition
    verify_enter_only: true             # Only verify enter transitions (not exit)
    neural:
      prototxt_path: models/MobileNetSSD_deploy.prototxt
      caffemodel_path: models/MobileNetSSD_deploy.caffemodel
      confidence_threshold: 0.5
      input_size: [300, 300]

refs:
  capture_stable_seconds: 5
  max_per_bucket: 3
  refresh_minutes: 30
  cache_dir: /tmp/ziggy-webcam/refs
